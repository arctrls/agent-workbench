model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"

[mcp_servers.atlassian]
url = "https://mcp.atlassian.com/v1/mcp"

[mcp_servers.browsermcp]
command = "npx"
args = ["@browsermcp/mcp@latest"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.context7.env]
DEFAULT_MINIMUM_TOKENS = "6000"

[mcp_servers.datadog-mcp]
url = "https://mcp.datadoghq.com/api/unstable/mcp-server/mcp"
type = "http"

[mcp_servers.datadog-mcp.http_headers]
DD-API-KEY = "${DD_API_KEY}"
DD-APPLICATION-KEY = "${DD_APP_KEY}"

[mcp_servers.databricks-sql]
command = "uvx"
args = [
  "uc-mcp-proxy",
  "--url",
  "https://dbc-d830a2e1-ec32.cloud.databricks.com/api/2.0/mcp/sql",
  "--auth-type",
  "databricks-cli",
  "--profile",
  "default",
]

[mcp_servers.mcp-installer]
command = "npx"
args = ["@anaisbetts/mcp-installer"]

[mcp_servers.mysql-mcp-server]
command = "uvx"
args = [
  "awslabs.mysql-mcp-server@latest",
  "--hostname",
  "dev-20251223-cluster.cluster-ro-cn1xjryhj9xq.ap-northeast-2.rds.amazonaws.com",
  "--secret_arn",
  "arn:aws:secretsmanager:ap-northeast-2:170023315897:secret:database/mcp/dev/credentials-7bZ8iP",
  "--database",
  "hmmall",
  "--region",
  "ap-northeast-2",
  "--readonly",
  "True",
]

[mcp_servers.mysql-mcp-server.env]
AWS_PROFILE = "default"
AWS_REGION = "ap-northeast-2"
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers.notion]
command = "npx"
args = ["-y", "@notionhq/notion-mcp-server"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
